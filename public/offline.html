<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HomeChef sin conexion</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
        background: #070b1b;
        color: #e5e7eb;
      }
      main {
        width: min(520px, calc(100vw - 32px));
        border: 1px solid #1f2a44;
        border-radius: 16px;
        padding: 24px;
        background: #0c132a;
      }
      h1 {
        margin: 0 0 8px;
      }
      p {
        margin: 0;
        color: #9ca3af;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>HomeChef esta sin conexion</h1>
      <p>La app seguira intentando cargar el shell guardado. Cuando vuelva internet, tus cambios pendientes se sincronizaran automaticamente.</p>
    </main>
  </body>
</html>
